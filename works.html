                <script type="text/javascript">

                   var currentFlower = 1;
                  next.onclick = function(){
                      currentFlower++;
                      if(currentFlower == 5){ currentFlower = 1;}
                      changeFlower(currentFlower);
                  }

                  prev.onclick = function(){
                      currentFlower--;
                      if(currentFlower == 0){ currentFlower = 4;}
                      changeFlower(currentFlower);
                  }

                  function changeFlower(f){
                      flower.style.background = "url('flower" + f + ".jpg')";
                      flower.style.backgroundSize = "cover";
                    }
